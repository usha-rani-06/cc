spring.application.name=citizenconnect

spring.datasource.url=jdbc:mysql://localhost:3306/citizenconnect_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8080

jwt.secret=citizenConnectSecretKeyForJWTTokenGenerationMustBeLongEnough
jwt.expiration=86400000
